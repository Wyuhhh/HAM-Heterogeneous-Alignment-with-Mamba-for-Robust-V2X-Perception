name: airv2x_HEAL_collab_lidar_4gpu
active_sensors: &id003
- lidar
collaborators: &id002
- vehicle
- rsu
- drone
ego_type: vehicle
bevcam_fov: 110
yaml_parser: load_airv2x_params
train_params:
  batch_size: 2
  epoches: 80
  eval_freq: 2
  save_freq: 1
  max_cav:
    vehicle: 2
    rsu: 2
    drone: 2
  # Gradient accumulation for effective batch size 2*4 = 8 per GPU step
  accum_steps: 1
  # Gradient clipping to prevent explosion from spike samples
  grad_clip: 5.0
  # Spike detection threshold
  loss_spike_thresh: 50.0
  # For multi-GPU with larger batch, use slightly higher log interval
  log_interval: 2
device: cuda
train: true
root_dir: /data1/wangyh/airdata/AirV2X-Perception/train/train
validate_dir: /data1/wangyh/airdata/AirV2X-Perception/val/val
test_dir: /data2/wangyh/test/test
num_class: 6
num_anchor: 2
task: det
seg_branch: both
seg_hw: 512
seg_res: 0.25
dynamic_class: 7
static_class: 3
fusion:
  core_method: IntermediateFusionDatasetAirv2x
  args:
    proj_first: true
    veh_grid_conf: &id004
      xbound:
      - -140.8
      - 140.8
      - 0.4
      ybound:
      - -40
      - 40
      - 0.4
      zbound:
      - -10
      - 15
      - 20.0
      ddiscr:
      - 2
      - 35
      - 48
      mode: LID
    veh_data_aug_conf: &id005
      resize_lim:
      - 0.65
      - 0.7
      final_dim:
      - 360
      - 640
      rot_lim:
      - 0
      - 0
      H: 720
      W: 1280
      rand_flip: false
      bot_pct_lim:
      - 0.0
      - 0.05
    rsu_grid_conf: &id006
      xbound:
      - -140.8
      - 140.8
      - 0.4
      ybound:
      - -40
      - 40
      - 0.4
      zbound:
      - -30
      - 15
      - 60.0
      ddiscr:
      - 2
      - 35
      - 48
      mode: LID
    rsu_data_aug_conf: &id007
      resize_lim:
      - 0.65
      - 0.7
      final_dim:
      - 360
      - 640
      rot_lim:
      - 0
      - 0
      H: 720
      W: 1280
      rand_flip: false
      bot_pct_lim:
      - 0.0
      - 0.05
    drone_grid_conf: &id008
      xbound:
      - -140.8
      - 140.8
      - 0.4
      ybound:
      - -40
      - 40
      - 0.4
      zbound:
      - -150
      - -6
      - 144.0
      ddiscr:
      - 2
      - 35
      - 48
      mode: LID
    drone_data_aug_conf: &id009
      resize_lim:
      - 0.65
      - 0.7
      final_dim:
      - 360
      - 640
      rot_lim:
      - 0
      - 0
      H: 720
      W: 1280
      rand_flip: false
      bot_pct_lim:
      - 0.0
      - 0.05
cav_lidar_range: &id001
- -140.8
- -40
- -30
- 140.8
- 40
- 30
preprocess:
  core_method: SpVoxelPreprocessor
  args:
    voxel_size:
    - 0.4
    - 0.4
    - 4
    max_points_per_voxel: 32
    max_voxel_train: 320000
    max_voxel_test: 700000
  cav_lidar_range: *id001
postprocess:
  core_method: VoxelPostprocessor
  gt_range: *id001
  anchor_args:
    cav_lidar_range: *id001
    l: 3.9
    w: 1.6
    h: 1.56
    r:
    - 0
    - 1.5707963267948966
    feature_stride: 2
    num_class: 6
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.4
  order: hwl
  max_num: 100
  nms_thresh: 0.15
  dir_args:
    dir_offset: 0.7853981633974483
    num_bins: 2
model:
  core_method: airv2x_HEAL
  args:
    voxel_size:
    - 0.4
    - 0.4
    - 4
    lidar_range: *id001
    active_sensor: *id003
    collaborators: *id002
    vehicle:
      modalities:
      - lidar
      lidar:
        voxel_size:
        - 0.4
        - 0.4
        - 4
        lidar_range:
        - -140.8
        - -40
        - -3
        - 140.8
        - 40
        - 1
        compression: 0
        backbone_fix: false
        pillar_vfe:
          use_norm: true
          with_distance: false
          use_absolute_xyz: true
          num_filters:
          - 64
        point_pillar_scatter:
          num_features: 64
      cam:
        grid_conf: *id004
        data_aug_conf: *id005
        img_downsample: 8
        img_features: 64
        bevout_feature: 64
        camera_encoder: EfficientNet
        use_depth_gt: true
        depth_supervision: false
    rsu:
      modalities:
      - lidar
      lidar:
        voxel_size:
        - 0.4
        - 0.4
        - 60
        lidar_range:
        - -140.8
        - -40
        - -30
        - 140.8
        - 40
        - 15
        compression: 0
        backbone_fix: false
        pillar_vfe:
          use_norm: true
          with_distance: false
          use_absolute_xyz: true
          num_filters:
          - 64
        point_pillar_scatter:
          num_features: 64
      cam:
        grid_conf: *id006
        data_aug_conf: *id007
        img_downsample: 8
        img_features: 64
        bevout_feature: 64
        camera_encoder: EfficientNet
        use_depth_gt: true
        depth_supervision: false
    drone:
      modalities:
      - lidar
      lidar:
        voxel_size:
        - 0.4
        - 0.4
        - 144
        lidar_range:
        - -140.8
        - -40
        - -150
        - 140.8
        - 40
        - -6
        compression: 0
        backbone_fix: false
        pillar_vfe:
          use_norm: true
          with_distance: false
          use_absolute_xyz: true
          num_filters:
          - 64
        point_pillar_scatter:
          num_features: 64
      cam:
        grid_conf: *id008
        data_aug_conf: *id009
        img_downsample: 8
        img_features: 64
        bevout_feature: 64
        camera_encoder: EfficientNet
        use_depth_gt: true
        depth_supervision: false
    modality_fusion:
      base_bev_backbone:
        layer_nums:
        - 3
        layer_strides:
        - 2
        num_filters:
        - 64
      compression: 0
      shrink_header:
        use: true
        kernal_size:
        - 3
        stride:
        - 1
        padding:
        - 1
        dim:
        - 256
        input_dim: 384
    fusion_backbone:
      resnext: true
      layer_nums:
      - 3
      - 5
      - 8
      layer_strides:
      - 1
      - 2
      - 2
      num_filters:
      - 64
      - 128
      - 256
      upsample_strides:
      - 1
      - 2
      - 4
      num_upsample_filter:
      - 128
      - 128
      - 128
      anchor_number: 2
    task: det
    seg_branch: both
    seg_hw: 512
    in_head: 256
    anchor_number: 2
    num_class: 6
    dynamic_class: 7
    static_class: 3
    cav_range: *id001
    seg_res: 0.25
    obj_head: true
loss:
  det:
    core_method: point_pillar_loss_multiclass
    args:
      cls_weight: 1.0
      reg: 2.0
      obj_weight: 1.0
      num_class: 6
  seg:
    core_method: vanilla_seg_loss
    args:
      seg_branch: both
      d_weights:
      - 200.0
      - 200.0
      - 75.0
      - 200.0
      - 200.0
      - 200.0
      s_weights: 50.0
      l_weights: 8.0
      d_coe: 2.0
      s_coe: 0.0
optimizer:
  core_method: Adam
  lr: 0.0008
  args:
    eps: 1e-10
    weight_decay: 0.0001
lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size:
  - 20
  - 40
  - 60

data_filter:
  train:
    ignore_scenarios: []
    ignore_frames:
    - &id010 {scenario: '2025_05_06_07_58_11', timestamp: '73'}
    - &id011 {scenario: '2025_05_06_07_58_11', timestamp: '41'}
    - &id012 {scenario: '2025_05_06_07_58_11', timestamp: '43'}
    - &id013 {scenario: '2025_05_06_07_58_11', timestamp: '57'}
    - &id014 {scenario: '2025_05_06_07_58_11', timestamp: '40'}
    - &id015 {scenario: '2025_05_06_07_58_11', timestamp: '64'}
    - &id016 {scenario: '2025_05_06_07_58_11', timestamp: '63'}
    - &id017 {scenario: '2025_05_06_07_58_11', timestamp: '74'}
    - &id210 {scenario: '2025_05_06_08_16_50', timestamp: '65'}
    - &id211 {scenario: '2025_05_06_08_16_50', timestamp: '66'}
    - &id212 {scenario: '2025_05_06_08_16_50', timestamp: '67'}
    - &id213 {scenario: '2025_05_06_08_16_50', timestamp: '200'}
    - &id214 {scenario: '2025_05_06_08_16_50', timestamp: '201'}
    - &id215 {scenario: '2025_05_06_08_16_50', timestamp: '203'}
    - &id216 {scenario: '2025_05_06_08_16_50', timestamp: '338'}
    - &id217 {scenario: '2025_05_06_08_16_50', timestamp: '339'}
    - &id218 {scenario: '2025_05_06_08_16_50', timestamp: '536'}
    - &id219 {scenario: '2025_05_06_08_16_50', timestamp: '539'}
    - &id220 {scenario: '2025_05_06_08_16_50', timestamp: '980'}
